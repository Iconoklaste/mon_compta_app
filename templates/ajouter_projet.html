{% extends 'base.html' %}

{% block page_title %}
    NOUVEAU PROJET
{% endblock %}

{% block content %}
    

    <form method="POST" id="projetForm">
        {{ form.hidden_tag() }}
        <div class="form-group">
            <label for="nom">Nom du projet</label>
            <input type="text" class="form-control" id="nom" name="nom" required>
        </div>
        <div class="form-group">
            <label for="client_id">Client</label>
            <select class="form-control" id="client_id" name="client_id" required>
                {% for client in clients %}
                    <option value="{{ client.id }}">{{ client.nom }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <button type="button" class="btn btn-secondary" data-toggle="modal" data-target="#addClientModal">
                Ajouter un nouveau client
            </button>
        </div>
        <div class="form-group">
            <label for="date_debut">Date de début</label>
            <input type="date" class="form-control" id="date_debut" name="date_debut">
        </div>
        <div class="form-group">
            <label for="date_fin">Date de fin</label>
            <input type="date" class="form-control" id="date_fin" name="date_fin">
        </div>
        <div class="form-group">
            <label for="statut">Statut</label>
            <select class="form-control" id="statut" name="statut">
                {% for status in status_options %}
                    <option value="{{ status }}" {% if status == 'En attente' %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="prix_total">Prix total</label>
            <input type="number" class="form-control" id="prix_total" name="prix_total">
        </div>
        <button type="submit" class="btn btn-primary">Ajouter</button>
    </form>

    <!-- Modal for adding a new client -->
<div class="modal fade" id="addClientModal" tabindex="-1" role="dialog" aria-labelledby="addClientModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addClientModalLabel">Ajouter un nouveau client</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="addClientForm">
                    <div class="form-group">
                        <label for="nom">Nom du client</label>
                        <input type="text" class="form-control" id="nom" name="nom" required>
                        <div class="invalid-feedback" id="nomError"></div>
                    </div>
                    <div class="form-group">
                        <label for="adresse">Adresse</label>
                        <input type="text" class="form-control" id="adresse" name="adresse">
                        <div class="invalid-feedback" id="adresseError"></div>
                    </div>
                    <div class="form-group">
                        <label for="code_postal">Code postal</label>
                        <input type="text" class="form-control" id="code_postal" name="code_postal" pattern="[0-9]{5}" title="Le code postal doit contenir 5 chiffres">
                        <div class="invalid-feedback" id="code_postalError"></div>
                    </div>
                    <div class="form-group">
                        <label for="ville">Ville</label>
                        <input type="text" class="form-control" id="ville" name="ville">
                        <div class="invalid-feedback" id="villeError"></div>
                    </div>
                    <div class="form-group">
                        <label for="telephone">Téléphone</label>
                        <input type="text" class="form-control" id="telephone" name="telephone">
                        <div class="invalid-feedback" id="telephoneError"></div>
                    </div>
                    <div class="form-group">
                        <label for="mail">Email</label>
                        <input type="email" class="form-control" id="mail" name="mail">
                        <div class="invalid-feedback" id="mailError"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Fermer</button>
                <button type="button" class="btn btn-primary" id="saveClient">Enregistrer</button>
            </div>
        </div>
    </div>
</div>


<script>
document.getElementById('saveClient').addEventListener('click', function() {
    const addClientForm = document.getElementById('addClientForm');
    const formData = new FormData(addClientForm);

    // Basic validation
    let isValid = true;
    const nom = formData.get('nom');
    if (!nom) {
        isValid = false;
        const inputField = document.getElementById('nom');
        const errorDiv = document.getElementById('nomError');
        inputField.classList.add('is-invalid');
        errorDiv.textContent = "Le nom est obligatoire";
    }

    if (isValid) {
        // Convert FormData to a plain object
        const data = {};
        formData.forEach((value, key) => {
            data[key] = value;
        });

        fetch('/clients/ajouter_client', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json', // Specify JSON content type
                'X-CSRFToken': '{{ csrf_token() }}'
            },
            body: JSON.stringify(data), // Send data as JSON
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const clientSelect = document.getElementById('client_id');
                const newOption = document.createElement('option');
                newOption.value = data.client_id;
                newOption.text = nom;
                clientSelect.add(newOption);
                clientSelect.value = data.client_id;
                $('#addClientModal').modal('hide');
                addClientForm.reset(); // Reset the form
                clearValidationErrors();
            } else {
                displayValidationErrors(data.errors);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Une erreur est survenue lors de l\'ajout du client.');
        });
    }
});

function clearValidationErrors() {
    document.querySelectorAll('.form-control').forEach(input => {
        input.classList.remove('is-invalid');
    });
    document.querySelectorAll('.invalid-feedback').forEach(div => {
        div.textContent = '';
    });
}

function displayValidationErrors(errors) {
    clearValidationErrors();
    if (errors) {
        for (const field in errors) {
            const inputField = document.getElementById(field);
            const errorDiv = document.getElementById(field + 'Error');

            if (inputField && errorDiv) {
                inputField.classList.add('is-invalid');
                errorDiv.textContent = errors[field].join(', ');
            }
        }
    } else {
        alert('Une erreur est survenue lors de l\'ajout du client.');
    }
}

// Add event listeners to clear errors on input
document.querySelectorAll('#addClientForm .form-control').forEach(input => {
    input.addEventListener('input', () => {
        input.classList.remove('is-invalid');
        const errorDiv = document.getElementById(input.id + 'Error');
        if (errorDiv) {
            errorDiv.textContent = '';
        }
    });
});

// Clear form fields when the modal is hidden
$('#addClientModal').on('hidden.bs.modal', function () {
    document.getElementById('addClientForm').reset();
    clearValidationErrors();
});

</script>



{% endblock %}
