{% extends 'base.html' %}

{% block page_title %}
    <h1>Projets</h1>
{% endblock %}

{% block content %}
    {% if projets %}
        <section>
            <ul class="list-group">
                {% for projet in projets %}
                    <li class="list-group-item">
                        <a href="{{ url_for('projets.projet_detail', projet_id=projet.id) }}">{{ projet.nom }}</a> - {{ projet.statut }}
                    </li>
                {% endfor %}
            </ul>
        </section>
    {% else %}
        <p>Vous n'avez pas encore de projet :-(</p>
        <a href="{{ url_for('projets.ajouter_projet') }}" class="btn btn-primary">Ajouter un projet</a>
    {% endif %}
{% endblock %}
